<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centro Cuídate Coín · Volvemos pronto</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0b;
      overflow: hidden;
      color: #fff;
    }

    /* ── Fondo con partículas doradas ── */
    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, #1a0a00 0%, #0b0b0b 60%),
                  radial-gradient(ellipse at 80% 20%, #0d1a00 0%, transparent 50%);
      z-index: 0;
    }

    canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Línea decorativa superior ── */
    .top-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #c9a96e, #e8c97e, #c9a96e, transparent);
      animation: shimmer 3s ease-in-out infinite;
      z-index: 10;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ── Tarjeta central ── */
    .card {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 3.5rem 4rem;
      max-width: 620px;
      width: 90%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 2px;
      backdrop-filter: blur(10px);
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Icono / logo ── */
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.8rem;
      border: 1.5px solid #c9a96e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,110,0.3); }
      50% { box-shadow: 0 0 0 12px rgba(201,169,110,0); }
    }

    /* ── Texto ── */
    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      line-height: 1.2;
      color: #f5f0e8;
      margin-bottom: 1rem;
    }

    h1 em {
      font-style: italic;
      color: #c9a96e;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a96e, transparent);
      margin: 1.5rem auto;
    }

    .message {
      font-weight: 300;
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.65);
      margin-bottom: 2rem;
    }

    /* ── Enlace a dailymp.es ── */
    .info-box {
      border: 1px solid rgba(201,169,110,0.3);
      padding: 1.1rem 1.5rem;
      background: rgba(201,169,110,0.06);
      border-radius: 2px;
      margin-bottom: 1.8rem;
    }

    .info-box p {
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 0.5rem;
    }

    .info-box a {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: #c9a96e;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.3s;
      position: relative;
    }

    .info-box a::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 1px;
      background: #c9a96e;
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .info-box a:hover { color: #e8c97e; }
    .info-box a:hover::after { transform: scaleX(1); }

    /* ── Footer ── */
    .footer-text {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <canvas id="particles"></canvas>
  <div class="top-line"></div>

  <div class="card">
    <div class="icon">✦</div>
    <p class="eyebrow">Centro Cuídate · Coín</p>
    <h1>Estamos haciendo<br/><em>algunos cambios</em></h1>
    <div class="divider"></div>
    <p class="message">
      Trabajamos para ofrecerte una experiencia<br/>
      aún más cuidada. Volvemos muy pronto.
    </p>
    <div class="info-box">
      <p>Para más información, visítanos en</p>
      <a href="https://dailymp.es" target="_blank" rel="noopener">dailymp.es</a>
    </div>
    <p class="footer-text">Bienestar integral · Coín, Málaga</p>
  </div>

  <script>
    // Partículas doradas flotantes
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function createParticles() {
      particles = Array.from({ length: 60 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        dx: (Math.random() - 0.5) * 0.3,
        dy: -Math.random() * 0.4 - 0.1,
        alpha: Math.random() * 0.5 + 0.1,
        dAlpha: (Math.random() - 0.5) * 0.003,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,169,110,${p.alpha})`;
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;
        p.alpha += p.dAlpha;

        if (p.alpha <= 0.05 || p.alpha >= 0.7) p.dAlpha *= -1;
        if (p.y < -10) p.y = H + 10;
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
      });
      requestAnimationFrame(draw);
    }

    resize();
    createParticles();
    draw();
    window.addEventListener('resize', () => { resize(); createParticles(); });
  </script>
</body>
</html>
